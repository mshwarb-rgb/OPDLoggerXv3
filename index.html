<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b3a6a" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <title>OPD LoggerX</title>
    <style>
      body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:#f6f8fb;color:#0b1220}
      #boot{padding:18px}
      #err{white-space:pre-wrap;color:#b00020;font-weight:700}
    </style>
  </head>
  <body>
    <div id="boot">
      <div style="font-weight:900;font-size:18px;">OPD LoggerX</div>
      <div style="margin-top:6px;">Loading…</div>
      <div id="err"></div>
    </div>
    <div id="app"></div>
    <script>
      window.addEventListener('error', (e)=>{
        const el=document.getElementById('err');
        if(el) el.textContent = 'App error: ' + (e.message || e.error || 'Unknown error');
      });
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
